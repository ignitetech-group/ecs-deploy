name: Semgrep
on:
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Branch to run Semgrep against'
        required: false
        default: ''
  push:
    branches:
      - master
      - main
      - develop
  pull_request: {}
  schedule:
    - cron: '0 8 * * 0'  # Every Sunday at 8:00 UTC

jobs:
  semgrep:
    name: semgrep/ci
    if: (github.actor != 'dependabot[bot]')
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: ignitetech-group/semgrep/.github/workflows/semgrep-reusable.yml@v1
    # Least-privilege: pass only the one secret the reusable workflow needs,
    # instead of `secrets: inherit` (which hands it every repo/org secret).
    # The reusable declares SEMGREP_APP_TOKEN under its workflow_call.secrets
    # schema on the v1 tag. IMPORTANT: do not deploy this ahead of that tag —
    # a caller passing a secret the reusable hasn't declared fails at startup
    # with zero jobs. SEMGREP_ORG / SEMGREP_JOBS / SEMGREP_MAX_MEMORY are
    # `vars`, not secrets, so they are unaffected.
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
    with:
      target_branch: ${{ github.event_name != 'pull_request' && (github.event_name == 'workflow_dispatch' && github.event.inputs.target_branch || github.ref_name) || '' }}
      is_pr: ${{ github.event_name == 'pull_request' }}
      pr_number: ${{ github.event.pull_request.number || '' }}
      semgrep_jobs: ${{ vars.SEMGREP_JOBS || '4' }}
      semgrep_max_memory: ${{ vars.SEMGREP_MAX_MEMORY || '5000' }}
      is_scheduled: ${{ github.event_name == 'schedule' }}
