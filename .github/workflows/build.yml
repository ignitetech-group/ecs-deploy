name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call: {}

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Python 3.13
        # actions/setup-python@v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.13'

      - name: Install ruff
        run: |
          pip install --quiet --no-cache-dir 'ruff==0.7.4'

      - name: ruff check
        run: ruff check ecs_deploy tests

      # Note on `ruff format --check` and `pyright`:
      # both are configured in pyproject.toml so editors and contributors get
      # consistent results, but they are NOT yet gating CI. Upstream code is
      # not ruff-formatted, and pyright surfaces real (but pre-existing) type
      # ambiguities in ecs_deploy/ecs.py / cli.py that need a focused
      # cleanup PR. Tightening both is tracked as a follow-up so the
      # bootstrap PR stays scoped to security invariants.

      - name: hadolint (Dockerfile)
        run: |
          docker run --rm -i hadolint/hadolint:latest-debian < Dockerfile

      - name: actionlint (workflows)
        run: |
          docker run --rm -v "${PWD}":/repo --workdir /repo \
            rhysd/actionlint:latest -color

      - name: yamllint (.github yaml)
        run: |
          docker run --rm -v "${PWD}":/data cytopia/yamllint:latest \
            -d "{extends: default, rules: {line-length: {max: 220}, document-start: disable, indentation: {spaces: 2}, comments: {min-spaces-from-content: 1}, truthy: {check-keys: false}}}" \
            .github/workflows .github/dependabot.yml

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: [lint]
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - name: Set up Python ${{ matrix.python-version }}
        # actions/setup-python@v6.2.0
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (lockfile + project + test reqs)
        run: |
          python -m pip install --upgrade pip
          # Install runtime deps from the hashed lockfile when running on
          # 3.13 (the version the lockfile is pinned for). On older minors
          # we fall back to setup.py's resolved deps because the 3.13
          # lockfile may select wheels that don't exist for older Pythons.
          if [ "${{ matrix.python-version }}" = "3.13" ]; then
            pip install --no-cache-dir --requirement requirements.txt
            pip install --no-cache-dir --no-deps .
          else
            pip install --no-cache-dir .
          fi
          pip install --no-cache-dir -r requirements-test.txt

      - name: Run tests
        run: pytest --cov ecs_deploy
